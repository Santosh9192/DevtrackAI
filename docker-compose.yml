version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: devtrack-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Rutik@123}
      MYSQL_DATABASE: devtrack_ai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devtrack-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-Rutik@123}@mysql:3306/devtrack_ai
      SECRET_KEY: ${SECRET_KEY:-production-secret-key-change-me}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      DEBUG: "False"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devtrack-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"

volumes:
  mysql_data:
