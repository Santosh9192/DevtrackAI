<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="60" fill="url(#bg)"/>
  <g transform="translate(200,160)">
    <!-- Circuit board icon -->
    <rect x="-60" y="-60" width="120" height="120" rx="16" fill="none" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#00d4ff" stroke-width="3"/>
    <circle cx="0" cy="0" r="8" fill="#7b2ff7"/>
    <!-- Lines -->
    <line x1="-40" y1="-40" x2="-20" y2="-20" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="-40" x2="20" y2="-20" stroke="#7b2ff7" stroke-width="3" stroke-linecap="round"/>
    <line x1="-40" y1="40" x2="-20" y2="20" stroke="#7b2ff7" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="20" y2="20" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    <!-- Dots -->
    <circle cx="-40" cy="-40" r="4" fill="#00d4ff"/>
    <circle cx="40" cy="-40" r="4" fill="#7b2ff7"/>
    <circle cx="-40" cy="40" r="4" fill="#7b2ff7"/>
    <circle cx="40" cy="40" r="4" fill="#00d4ff"/>
  </g>
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">DevTrack</text>
  <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8888aa" letter-spacing="4">AI</text>
</svg>
